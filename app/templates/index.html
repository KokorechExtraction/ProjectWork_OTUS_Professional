<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Async Messenger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="alert d-none" id="statusAlert" role="alert"></div>
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title">Auth</h3>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" id="username" />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" id="email" />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" />
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-primary" id="registerBtn">Register</button>
                <button class="btn btn-success" id="loginBtn">Login</button>
              </div>
              <hr>
              <div class="mb-3">
                <label class="form-label">JWT Token</label>
                <textarea class="form-control" id="token" rows="4"></textarea>
              </div>
              <button class="btn btn-dark" id="connectBtn">Connect WebSocket</button>
            </div>
          </div>

          <div class="card shadow-sm mt-4">
            <div class="card-body">
              <h4 class="card-title">Chats</h4>
              <div class="input-group mb-3">
                <input class="form-control" id="otherUserId" placeholder="Other user id">
                <button class="btn btn-outline-primary" id="createChatBtn">Create</button>
              </div>
              <ul class="list-group" id="chatList"></ul>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h3 class="card-title">Messages</h3>
              <div class="mb-3">
                <label class="form-label">Active Chat ID</label>
                <input class="form-control" id="activeChatId" />
              </div>
              <div id="messages" class="border rounded p-3 bg-white mb-3 message-box"></div>
              <div class="mb-3">
                <label class="form-label">Message</label>
                <input class="form-control" id="messageText" />
              </div>
              <div class="mb-3">
                <label class="form-label">Attach file</label>
                <input type="file" class="form-control" id="messageFile" />
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-primary" id="sendMessageBtn">Send Message</button>
                <button class="btn btn-outline-secondary" id="loadMessagesBtn">Load Messages</button>
              </div>
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title">Microblog</h3>
              <div class="mb-3">
                <textarea class="form-control" id="postText" rows="3" placeholder="Write a post..."></textarea>
              </div>
              <button class="btn btn-primary mb-3" id="createPostBtn">Create Post</button>
              <div id="posts" class="d-grid gap-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>

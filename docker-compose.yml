x-app-base: &app-base
  build: .
  env_file:
    - .env
  volumes:
    - .:/code
    - ./media:/code/media
  depends_on:
    - db
    - redis

services:
  app:
    <<: *app-base
    container_name: projectwork_app_1
    ports:
      - "8000:8000"

  app2:
    <<: *app-base
    container_name: projectwork_app_2
    ports:
      - "8001:8000"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

volumes:
  pg_data:
